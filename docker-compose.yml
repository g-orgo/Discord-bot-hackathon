services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        echo "Checking if model llama3.2:3b is already installed..."
        if ollama list | grep -q "llama3.2:3b"; then
          echo "Model llama3.2:3b is already installed. Skipping pull."
        else
          echo "Model llama3.2:3b not found. Pulling..."
          ollama pull llama3.2:3b
        fi
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: no

  llm:
    build: ./raptor-chatbot-llm
    ports:
      - "${LLM_PORT:-8000}:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - CORS_ORIGIN=http://localhost
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  auth-server:
    build: ./raptor-chatbot-server
    ports:
      - "${AUTH_PORT:-3001}:3001"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - MONGOMS_DOWNLOAD_DIR=/app/.mongodb-binaries
      - DISCORD_BOT_SECRET=${DISCORD_BOT_SECRET:-raptor-bot-secret-change-in-prod}
    volumes:
      - auth_data:/app/data
    restart: unless-stopped

  web:
    build: ./raptor-chatbot-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - llm
      - auth-server
    restart: unless-stopped

  bot:
    build: ./raptor-chatbot
    ports:
      - "${BOT_PORT:-3000}:3000"
    environment:
      - APP_ID=${APP_ID}
      - PUBLIC_KEY=${PUBLIC_KEY}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - PORT=3000
      - LLM_URL=http://llm:8000
      - AUTH_URL=http://auth-server:3001
      - DISCORD_BOT_SECRET=${DISCORD_BOT_SECRET:-raptor-bot-secret-change-in-prod}
    depends_on:
      - llm
      - auth-server
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http bot:3000
    ports:
      - "${NGROK_PORT:-4040}:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - bot
    restart: unless-stopped

volumes:
  ollama_models:
  auth_data:
